name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv pip install -e .
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -d app_test -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv pip install -e .
      - name: Run tests
        run: DB_URL="postgresql+asyncpg://postgres:postgres@localhost:5432/app_test" SECRET_KEY=ci-secret-key uv run pytest tests/ -v --cov=src/ --cov-report=term-missing
